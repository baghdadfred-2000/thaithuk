<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact | ThaiThuk</title>
<meta name="description" content="Contact the ThaiThuk team — story tips, corrections, contributor pitches and partnership enquiries.">
<script>if(localStorage.getItem('thaituk_theme')!=='light')document.documentElement.classList.add('dark')</script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw-config.js?v=3"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css?v=3">
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body class="bg-cream dark:bg-night font-sans text-ink dark:text-slate-100 antialiased">

<div id="site-header"></div>

<main class="max-w-7xl mx-auto px-4 mt-10">
  <div class="max-w-2xl mx-auto">
    <p class="text-[11px] font-bold uppercase tracking-widest text-gold">Contact</p>
    <h1 class="font-serif text-3xl md:text-4xl font-bold mt-2 dark:text-white">Say sawasdee</h1>
    <p class="mt-3 text-ink/70 dark:text-slate-300">Story tips, corrections, contributor pitches, partnership enquiries — we read everything. Corrections get priority.</p>

    <!-- For Netlify hosting, add: name="contact" method="POST" data-netlify="true"
         and remove the JS mock in site.js (initContactForm). -->
    <form id="contact-form" class="mt-8 space-y-4 bg-surface dark:bg-slate-800 rounded-xl shadow-soft border border-gold/15 dark:border-slate-700 p-6">
      <div class="grid sm:grid-cols-2 gap-4">
        <label class="block">
          <span class="text-sm font-medium">Name</span>
          <input required name="name" class="mt-1 w-full px-3 py-2 rounded-md border border-gold/25 bg-cream dark:bg-slate-900 dark:border-slate-600 dark:text-slate-100">
        </label>
        <label class="block">
          <span class="text-sm font-medium">Email</span>
          <input required type="email" name="email" class="mt-1 w-full px-3 py-2 rounded-md border border-gold/25 bg-cream dark:bg-slate-900 dark:border-slate-600 dark:text-slate-100">
        </label>
      </div>
      <label class="block">
        <span class="text-sm font-medium">Topic</span>
        <select name="topic" class="mt-1 w-full px-3 py-2 rounded-md border border-gold/25 bg-cream dark:bg-slate-900 dark:border-slate-600 dark:text-slate-100">
          <option>Story tip</option>
          <option>Correction</option>
          <option>Write for us</option>
          <option>Partnership / advertising</option>
          <option>Something else</option>
        </select>
      </label>
      <label class="block">
        <span class="text-sm font-medium">Message</span>
        <textarea required name="message" rows="6" class="mt-1 w-full px-3 py-2 rounded-md border border-gold/25 bg-cream dark:bg-slate-900 dark:border-slate-600 dark:text-slate-100"></textarea>
      </label>
      <button class="px-6 py-3 rounded-full bg-hot text-white font-semibold hover:bg-red-800">Send message</button>
    </form>

    <div id="contact-success" class="hidden mt-8 bg-emerald2/10 border border-emerald2/40 rounded-xl p-6 text-center">
      <p class="text-2xl">🙏</p>
      <h2 class="font-serif text-xl font-bold mt-2 dark:text-white">Kop khun mak!</h2>
      <p class="mt-1 text-sm text-ink/70 dark:text-slate-300">Your message is on its way. We usually reply within two working days.</p>
    </div>

    <p class="mt-6 text-sm text-ink/60 dark:text-slate-400">Prefer email? <a href="mailto:hello@thaituk.com" class="text-teal underline">hello@thaituk.com</a></p>
  </div>
</main>

<div id="site-footer"></div>
<script src="assets/site.js?v=3"></script>
</body>
</html>
